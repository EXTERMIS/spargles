<!DOCTYPE html>
<html>

<head>
  <title>Spargles</title>
  <link rel="icon" href="images/Tab-Icon.png" />

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/imports.css">
  <link rel="stylesheet" href="css/section-1.css">
  <link rel="stylesheet" href="css/section-2.css">
  <link rel="stylesheet" href="css/section-3.css">

  <link rel="stylesheet" media="screen and (max-width: 600px)" href="css/screen-sizes/600px.css">

  <script type="text/javascript" src="js/main1.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <!-- Background Image -->
  <img class="Background-image" id="bg-img" src="images/BG.jpg" alt="Background Image" />

  <div class="mascot">
    <div class="corner">
      <p id="mascot-text" class="mascot-text">Welcome!</p>
    </div>
    <img alt="Mascot" src="images/Mascot.png" onclick="(this)" />
  </div>

  <div class="welcome section">
    <div class="navbar">
      <!-- Buttons in Navbar -->
      <div class="navbutton" onclick="home()">
        <p>HOME</p>
      </div>
      <div class="navbutton" onclick="shop()">
        <p>SHOP</p>
      </div>
      <div class="navbutton" onclick="games()">
        <p>GAMES</p>
      </div>
      <div class="navbutton" onclick="gallery()">
        <p>GALLERY</p>
      </div>
      <div class="navbutton" onclick="programs()">
        <p>PROGRAMS</p>
      </div>
    </div>

    <!-- Logo -->
    <img alt="Spargles Logo" class="Spargles-logo fade-text" src="images/Spargles.png" />

    <!-- Fading Text -->
    <div class="Fade-Scroll fade-text">Scroll</div>
  </div>

  <!-- Area allowed for scrolling on page -->
  <div class="scroll-container">
    <div class="scroll-area"></div>
  </div>

    <footer>
      <p>&copy; <span id="year"></span> Spargles | All rights reserved. | <span class="footer-button"
          onclick="terms()">Terms of Service</span> | <span class="footer-button" onclick="contact()">Contact</span></p>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>

    <script>
      const fadeElements = document.querySelectorAll(".fade-element"); // Select all elements with the class
      let lastScrollTop = 0;

      window.addEventListener("scroll", function () {
        const scrollPosition = window.scrollY;
        const windowHeight = window.innerHeight;

        fadeElements.forEach((fadeElement) => {
          if (scrollPosition > lastScrollTop) {
            // Scrolling down: fade in quickly and reach full opacity
            fadeElement.style.opacity = Math.min(
              1,
              scrollPosition / (windowHeight / 2)
            );
            fadeElement.style.transition = "opacity 0.2s ease"; // Quicker fade in
          } else {
            // Scrolling up: gradually fade out based on scroll
            let opacity = (scrollPosition - 100) / (windowHeight - 100);
            if (opacity < 0) opacity = 0;
            fadeElement.style.opacity = opacity;
            fadeElement.style.transition = "opacity 0.5s ease"; // Slower fade out
          }
        });

        // Update last scroll position
        lastScrollTop = scrollPosition <= 0 ? 0 : scrollPosition;
      });
    </script>
</body>

</html>
