<!DOCTYPE html>
<html>
  <head>
    <link
      rel="icon"
      href="/images/Tab-Icon.png"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script type="text/javascript" src="/js/main.js"></script>

    <title>Spargles</title>
  </head>
  <body>  
    <img
      class="bg-img"
      src="/images/BG.jpg"
      alt="#"
    />
    <div class="welcome-gif">
      <div class="navbar">
        <div class="navbutton" onclick="home()"><p>HOME</p></div>
        <div class="navbutton" onclick="shop()"><p>SHOP</p></div>
        <div class="navbutton" onclick="gallery()"><p>GALLERY</p></div>
        <div class="navbutton" onclick="programs()"><p>PROGRAMS</p></div>
        <div class="navbutton" onclick="personal()"><p>PERSONAL</p></div>
        <div class="navbutton" onclick="game()"><p>GAMES</p></div>
      </div>
      <img
        alt="welcome-table-image"
        class="welcome-table-image fade-text"
        src="/images/Spargles.png"
      />
      <div class="login right1" onclick="signup()"><p>SIGNUP</p></div>
      <div class="login right2" onclick="login()"><p>LOGIN</p></div>
      <div class="pls-scroll fade-text">Scroll</div>
    </div>
    <div class="scroll-container">
      <div class="scroll-area"></div>
    </div>

    <div class="fade-element Scroll-Content1">
      <div class="Scroll-Content-Text-Title">
        <img
          class="Title-Img"
          src="/images/Spargles-Featured.png"
        />
      </div>
      <div class="scroll-section-anchor">
        <div class="scroll-section S-PRO">
          <div class="scrollnavbutton" onclick="project()"><p>WELCOME TO SPARGLES!</p></div>
        </div>
    </div>

    <script>
      document.addEventListener("scroll", function () {
        const scrollPosition = window.pageYOffset;
        const fadeText = document.querySelector(".fade-text");
        const fadeEffect = 1 - (scrollPosition * 3.5) / window.innerHeight;

        fadeText.style.opacity = fadeEffect >= 0 ? fadeEffect : 0;
      });

      window.addEventListener("scroll", function () {
        var element = document.querySelector(".pls-scroll");
        var scrollPosition = window.scrollY * 2;
        var fadeStart = 100; // Start fading at this scroll position
        var fadeEnd = 300; // Fully faded by this scroll position

        if (scrollPosition >= fadeStart && scrollPosition <= fadeEnd) {
          var opacity =
            1 - (scrollPosition - fadeStart) / (fadeEnd - fadeStart);
          element.style.opacity = opacity;
        } else if (scrollPosition > fadeEnd) {
          element.style.opacity = 0;
        } else {
          element.style.opacity = 1;
        }
      });

      window.addEventListener("scroll", function () {
        var element = document.querySelector(".bg-img");
        var scrollPosition = window.scrollY;
        var maxScroll = document.body.scrollHeight - window.innerHeight;

        // Calculate opacity: 1.0 when at the top, 0.25 when scrolled to the bottom
        var opacity = 1.0 - (scrollPosition / maxScroll) * 0.75;

        // Limit opacity to 0.25 (25%)
        if (opacity < 0.25) {
          opacity = 0.25;
        }

        element.style.opacity = opacity;
      });

      window.onbeforeunload = function () {
        window.scrollTo(0, 0);
      };

      const fadeElements = document.querySelectorAll(".fade-element"); // Select all elements with the class
      let lastScrollTop = 0;

      window.addEventListener("scroll", function () {
        const scrollPosition = window.scrollY;
        const windowHeight = window.innerHeight;

        fadeElements.forEach((fadeElement) => {
          if (scrollPosition > lastScrollTop) {
            // Scrolling down: fade in quickly and reach full opacity
            fadeElement.style.opacity = Math.min(
              1,
              scrollPosition / (windowHeight / 2)
            );
            fadeElement.style.transition = "opacity 0.2s ease"; // Quicker fade in
          } else {
            // Scrolling up: gradually fade out based on scroll
            let opacity = (scrollPosition - 100) / (windowHeight - 100);
            if (opacity < 0) opacity = 0;
            fadeElement.style.opacity = opacity;
            fadeElement.style.transition = "opacity 0.5s ease"; // Slower fade out
          }
        });

        // Update last scroll position
        lastScrollTop = scrollPosition <= 0 ? 0 : scrollPosition;
      });
    </script>
  </body>
</html>
